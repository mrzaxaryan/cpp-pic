name: Linux i386

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - "**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  LLVM_VERSION: "21.1.0"

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache LLVM
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: /opt/llvm
          key: llvm-${{ env.LLVM_VERSION }}-linux-x64

      - name: Install LLVM
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        run: |
          set -e
          TARBALL="LLVM-${{ env.LLVM_VERSION }}-Linux-X64.tar.xz"
          URL="https://github.com/llvm/llvm-project/releases/download/llvmorg-${{ env.LLVM_VERSION }}/${TARBALL}"
          wget -q "$URL"
          sudo mkdir -p /opt/llvm
          sudo tar xf "$TARBALL" -C /opt/llvm --strip-components=1
          rm "$TARBALL"

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake qemu-user-static

      - name: Add LLVM to PATH
        run: echo "/opt/llvm/bin" >> $GITHUB_PATH

      - name: Build all optimization levels
        run: |
          mkdir -p test-elfs
          for opt in O0 O1 O2 O3 Os Oz Og; do
            echo "=== Building -${opt} ==="
            rm -rf build
            cmake --preset linux-i386-release -DOPTIMIZATION_LEVEL=${opt}
            cmake --build --preset linux-i386-release
            cp $(find build -type f -name "output.elf" | head -n 1) test-elfs/output-${opt}.elf
            cp $(find build -type f -name "output.bin" | head -n 1) test-elfs/output-${opt}.bin
          done

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-linux-i386
          retention-days: 1
          path: test-elfs/

      - name: Test all optimization levels
        if: always()
        run: |
          failed=0
          for elf in test-elfs/output-*.elf; do
            opt=$(basename "$elf" .elf | sed 's/output-//')
            echo "=== Testing ELF -${opt} ==="
            chmod +x "$elf"
            if qemu-i386-static "$elf"; then
              echo "=== ELF PASSED -${opt} ==="
            else
              echo "=== ELF FAILED -${opt} ==="
              failed=1
            fi
          done
          for bin in test-elfs/output-*.bin; do
            opt=$(basename "$bin" .bin | sed 's/output-//')
            echo "=== Testing PIC -${opt} ==="
            if docker run --rm --platform linux/386 \
              -v "$PWD:/work" -w /work \
              python:3.11-slim-bullseye \
              python3 scripts/loader.py --arch i386 "$bin"; then
              echo "=== PIC PASSED -${opt} ==="
            else
              echo "=== PIC FAILED -${opt} ==="
              failed=1
            fi
          done
          exit $failed
