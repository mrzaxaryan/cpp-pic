name: OpenBSD i386

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - "**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  LLVM_VERSION: "21.1.0"

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache LLVM
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: /opt/llvm
          key: llvm-${{ env.LLVM_VERSION }}-linux-x64

      - name: Install LLVM
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        run: |
          set -e
          TARBALL="LLVM-${{ env.LLVM_VERSION }}-Linux-X64.tar.xz"
          URL="https://github.com/llvm/llvm-project/releases/download/llvmorg-${{ env.LLVM_VERSION }}/${TARBALL}"
          wget -q "$URL"
          sudo mkdir -p /opt/llvm
          sudo tar xf "$TARBALL" -C /opt/llvm --strip-components=1
          rm "$TARBALL"

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake

      - name: Add LLVM to PATH
        run: echo "/opt/llvm/bin" >> $GITHUB_PATH

      - name: Build all optimization levels
        run: |
          for opt in O0 O1 O2 O3 Os Oz Og; do
            echo "=== Building -${opt} ==="
            rm -rf build
            cmake --preset openbsd-i386-release -DOPTIMIZATION_LEVEL=${opt}
            cmake --build --preset openbsd-i386-release
            mkdir -p "release/${opt}"
            find build/release -type f -not -path "*/cmake/*" -exec cp {} "release/${opt}/" \;
          done

      - name: Upload all artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-openbsd-i386
          retention-days: 1
          path: release/

      # Note: vmactions/openbsd-vm does not support i386 architecture.
      # Build-only verification for now.
