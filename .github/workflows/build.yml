name: Build & Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"

concurrency:
  group: ci-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

env:
  LLVM_VERSION: "22.1.0"

jobs:
  # ═════════════════════════════════════════════════════════════════════════
  # Build — all 26 targets cross-compiled on Linux x86_64
  # ═════════════════════════════════════════════════════════════════════════
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux ────────────────────────────────────────────────────────
          - { preset: linux-i386-release,       artifact: linux-i386       }
          - { preset: linux-x86_64-release,     artifact: linux-x86_64     }
          - { preset: linux-armv7a-release,     artifact: linux-armv7a     }
          - { preset: linux-aarch64-release,    artifact: linux-aarch64    }
          - { preset: linux-riscv32-release,    artifact: linux-riscv32    }
          - { preset: linux-riscv64-release,    artifact: linux-riscv64    }
          - { preset: linux-mips64-release,     artifact: linux-mips64,     opts: "O0 O1 O2 O3 Os Oz" }
          # ── Android ──────────────────────────────────────────────────────
          - { preset: android-armv7a-release,   artifact: android-armv7a   }
          - { preset: android-aarch64-release,  artifact: android-aarch64  }
          - { preset: android-x86_64-release,   artifact: android-x86_64  }
          # ── Windows ──────────────────────────────────────────────────────
          - { preset: windows-i386-release,     artifact: windows-i386     }
          - { preset: windows-x86_64-release,   artifact: windows-x86_64  }
          - { preset: windows-armv7a-release,   artifact: windows-armv7a   }
          - { preset: windows-aarch64-release,  artifact: windows-aarch64  }
          # ── macOS / iOS ──────────────────────────────────────────────────
          - { preset: macos-x86_64-release,     artifact: macos-x86_64    }
          - { preset: macos-aarch64-release,    artifact: macos-aarch64   }
          - { preset: ios-aarch64-release,      artifact: ios-aarch64     }
          # ── FreeBSD ──────────────────────────────────────────────────────
          - { preset: freebsd-i386-release,     artifact: freebsd-i386     }
          - { preset: freebsd-x86_64-release,   artifact: freebsd-x86_64  }
          - { preset: freebsd-aarch64-release,  artifact: freebsd-aarch64  }
          - { preset: freebsd-riscv64-release,  artifact: freebsd-riscv64  }
          # ── Solaris ──────────────────────────────────────────────────────
          - { preset: solaris-i386-release,     artifact: solaris-i386     }
          - { preset: solaris-x86_64-release,   artifact: solaris-x86_64  }
          - { preset: solaris-aarch64-release,  artifact: solaris-aarch64  }
          # ── UEFI ─────────────────────────────────────────────────────────
          - { preset: uefi-x86_64-release,      artifact: uefi-x86_64    }
          - { preset: uefi-aarch64-release,     artifact: uefi-aarch64   }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache LLVM
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: /opt/llvm
          key: llvm-${{ env.LLVM_VERSION }}-linux-x64

      - name: Install LLVM
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        run: |
          set -e
          TARBALL="LLVM-${{ env.LLVM_VERSION }}-Linux-X64.tar.xz"
          URL="https://github.com/llvm/llvm-project/releases/download/llvmorg-${{ env.LLVM_VERSION }}/${TARBALL}"
          wget -q "$URL"
          sudo mkdir -p /opt/llvm
          sudo tar xf "$TARBALL" -C /opt/llvm --strip-components=1
          rm "$TARBALL"

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake

      - name: Add LLVM to PATH
        run: echo "/opt/llvm/bin" >> $GITHUB_PATH

      - name: Build all optimization levels
        run: |
          OPTS="${{ matrix.opts }}"
          : "${OPTS:=O0 O1 O2 O3 Os Oz Og}"
          for opt in ${OPTS}; do
            echo "=== Building -${opt} ==="
            rm -rf build
            cmake --preset ${{ matrix.preset }} -DOPTIMIZATION_LEVEL=${opt}
            cmake --build --preset ${{ matrix.preset }}
            mkdir -p "release/${opt}"
            find build/release -type f -not -path "*/cmake/*" -exec cp {} "release/${opt}/" \;
          done

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.artifact }}
          retention-days: 1
          path: release/

  # ═════════════════════════════════════════════════════════════════════════
  # Test — native loader (python3 scripts/loader.py)
  # ═════════════════════════════════════════════════════════════════════════

  test-linux-x86_64:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: build-linux-x86_64, path: release/ }
      - run: |
          for dir in release/*/; do
            opt=$(basename "$dir")
            for bin in "$dir"*.bin; do
              [ -f "$bin" ] || continue
              echo "=== Testing PIC -${opt} ==="
              python3 scripts/loader.py --arch x86_64 "$bin" || { echo "FAILED"; exit 1; }
            done
          done

  test-linux-aarch64:
    needs: build
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: build-linux-aarch64, path: release/ }
      - run: |
          for dir in release/*/; do
            opt=$(basename "$dir")
            for bin in "$dir"*.bin; do
              [ -f "$bin" ] || continue
              echo "=== Testing PIC -${opt} ==="
              python3 scripts/loader.py --arch aarch64 "$bin" || { echo "FAILED"; exit 1; }
            done
          done

  test-android-x86_64:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: build-android-x86_64, path: release/ }
      - run: |
          for dir in release/*/; do
            opt=$(basename "$dir")
            for bin in "$dir"*.bin; do
              [ -f "$bin" ] || continue
              echo "=== Testing PIC -${opt} ==="
              python3 scripts/loader.py --arch x86_64 "$bin" || { echo "FAILED"; exit 1; }
            done
          done

  test-android-aarch64:
    needs: build
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: build-android-aarch64, path: release/ }
      - run: |
          for dir in release/*/; do
            opt=$(basename "$dir")
            for bin in "$dir"*.bin; do
              [ -f "$bin" ] || continue
              echo "=== Testing PIC -${opt} ==="
              python3 scripts/loader.py --arch aarch64 "$bin" || { echo "FAILED"; exit 1; }
            done
          done

  test-windows-i386:
    needs: build
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: build-windows-i386, path: release/ }
      - shell: pwsh
        run: |
          foreach ($dir in Get-ChildItem -Path release -Directory) {
            foreach ($bin in Get-ChildItem -Path $dir.FullName -Filter "*.bin") {
              Write-Host "=== Testing PIC -$($dir.Name) ==="
              python scripts/loader.py --arch i386 $bin.FullName
              if ($LASTEXITCODE -ne 0) { exit 1 }
            }
          }

  test-windows-x86_64:
    needs: build
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: build-windows-x86_64, path: release/ }
      - shell: pwsh
        run: |
          foreach ($dir in Get-ChildItem -Path release -Directory) {
            foreach ($bin in Get-ChildItem -Path $dir.FullName -Filter "*.bin") {
              Write-Host "=== Testing PIC -$($dir.Name) ==="
              python scripts/loader.py --arch x86_64 $bin.FullName
              if ($LASTEXITCODE -ne 0) { exit 1 }
            }
          }

  test-windows-aarch64:
    needs: build
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: build-windows-aarch64, path: release/ }
      - shell: pwsh
        run: |
          foreach ($dir in Get-ChildItem -Path release -Directory) {
            foreach ($bin in Get-ChildItem -Path $dir.FullName -Filter "*.bin") {
              Write-Host "=== Testing PIC -$($dir.Name) ==="
              python scripts/loader.py --arch aarch64 $bin.FullName
              if ($LASTEXITCODE -ne 0) { exit 1 }
            }
          }

  test-macos-aarch64:
    needs: build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: build-macos-aarch64, path: release/ }
      - run: |
          for dir in release/*/; do
            opt=$(basename "$dir")
            for bin in "$dir"*.bin; do
              [ -f "$bin" ] || continue
              echo "=== Testing PIC -${opt} ==="
              python3 scripts/loader.py --arch aarch64 "$bin" || { echo "FAILED"; exit 1; }
            done
          done

  test-macos-x86_64:
    needs: build
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: build-macos-x86_64, path: release/ }
      - run: |
          for dir in release/*/; do
            opt=$(basename "$dir")
            for bin in "$dir"*.bin; do
              [ -f "$bin" ] || continue
              echo "=== Testing PIC -${opt} ==="
              python3 scripts/loader.py --arch x86_64 "$bin" || { echo "FAILED"; exit 1; }
            done
          done

  test-ios-aarch64:
    needs: build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: build-ios-aarch64, path: release/ }
      - run: |
          for dir in release/*/; do
            opt=$(basename "$dir")
            for bin in "$dir"*.bin; do
              [ -f "$bin" ] || continue
              echo "=== Testing PIC -${opt} ==="
              python3 scripts/loader.py --arch aarch64 "$bin" || { echo "FAILED"; exit 1; }
            done
          done

  # ═════════════════════════════════════════════════════════════════════════
  # Test — Docker / QEMU-user
  # ═════════════════════════════════════════════════════════════════════════

  test-linux-i386:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: build-linux-i386, path: release/ }
      - uses: docker/setup-qemu-action@v3
        with: { platforms: linux/386 }
      - run: |
          docker run --rm --platform linux/386 \
            -v "$PWD:/work" -w /work \
            python:3.11-slim-bullseye \
            bash -c '
              for dir in release/*/; do
                opt=$(basename "$dir")
                for bin in "$dir"*.bin; do
                  [ -f "$bin" ] || continue
                  echo "=== Testing PIC -${opt} ==="
                  python3 scripts/loader.py --arch i386 "$bin" || { echo "FAILED"; exit 1; }
                done
              done
            '

  test-linux-riscv32:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: build-linux-riscv32, path: release/ }
      - run: sudo apt-get update && sudo apt-get install -y qemu-user-static
      - run: |
          for dir in release/*/; do
            opt=$(basename "$dir")
            for elf in "$dir"*.elf; do
              [ -f "$elf" ] || continue
              echo "=== Testing ELF -${opt} ==="
              chmod +x "$elf"
              qemu-riscv32-static "$elf" || { echo "FAILED"; exit 1; }
            done
          done

  # ═════════════════════════════════════════════════════════════════════════
  # Test — uraimo/run-on-arch
  # ═════════════════════════════════════════════════════════════════════════

  test-linux-armv7a:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: build-linux-armv7a, path: release/ }
      - uses: uraimo/run-on-arch-action@v2
        with:
          arch: armv7
          distro: ubuntu22.04
          install: apt-get update && apt-get install -y python3
          run: |
            for dir in release/*/; do
              opt=$(basename "$dir")
              for bin in "$dir"*.bin; do
                [ -f "$bin" ] || continue
                echo "=== Testing PIC -${opt} ==="
                python3 scripts/loader.py --arch armv7a "$bin" || { echo "FAILED"; exit 1; }
              done
            done

  test-linux-riscv64:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: build-linux-riscv64, path: release/ }
      - uses: uraimo/run-on-arch-action@v2
        with:
          arch: riscv64
          distro: ubuntu22.04
          install: apt-get update && apt-get install -y python3
          run: |
            for dir in release/*/; do
              opt=$(basename "$dir")
              for bin in "$dir"*.bin; do
                [ -f "$bin" ] || continue
                echo "=== Testing PIC -${opt} ==="
                python3 scripts/loader.py --arch riscv64 "$bin" || { echo "FAILED"; exit 1; }
              done
            done

  test-android-armv7a:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: build-android-armv7a, path: release/ }
      - uses: uraimo/run-on-arch-action@v2
        with:
          arch: armv7
          distro: ubuntu22.04
          install: apt-get update && apt-get install -y python3
          run: |
            for dir in release/*/; do
              opt=$(basename "$dir")
              for bin in "$dir"*.bin; do
                [ -f "$bin" ] || continue
                echo "=== Testing PIC -${opt} ==="
                python3 scripts/loader.py --arch armv7a "$bin" || { echo "FAILED"; exit 1; }
              done
            done

  # ═════════════════════════════════════════════════════════════════════════
  # Test — vmactions FreeBSD
  # ═════════════════════════════════════════════════════════════════════════

  test-freebsd-x86_64:
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: build-freebsd-x86_64, path: release/ }
      - uses: vmactions/freebsd-vm@v1
        with:
          sync: scp
          prepare: pkg install -y python3
          usesh: true
          run: |
            for dir in release/*/; do
              opt=$(basename "$dir")
              for bin in "$dir"*.bin; do
                [ -f "$bin" ] || continue
                echo "=== Testing PIC -${opt} ==="
                python3 scripts/loader.py --arch x86_64 "$bin" || { echo "FAILED"; exit 1; }
              done
            done

  test-freebsd-aarch64:
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: build-freebsd-aarch64, path: release/ }
      - uses: vmactions/freebsd-vm@v1
        with:
          arch: aarch64
          sync: scp
          prepare: pkg install -y python3
          usesh: true
          run: |
            for dir in release/*/; do
              opt=$(basename "$dir")
              for bin in "$dir"*.bin; do
                [ -f "$bin" ] || continue
                echo "=== Testing PIC -${opt} ==="
                python3 scripts/loader.py --arch aarch64 "$bin" || { echo "FAILED"; exit 1; }
              done
            done

  test-freebsd-i386:
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: build-freebsd-i386, path: release/ }
      - uses: vmactions/freebsd-vm@v1
        with:
          sync: scp
          prepare: pkg install -y python3
          usesh: true
          run: |
            for dir in release/*/; do
              opt=$(basename "$dir")
              for elf in "$dir"*.elf; do
                [ -f "$elf" ] || continue
                chmod +x "$elf"
                "$elf" || { echo "FAILED -${opt}"; exit 1; }
              done
            done
            echo "=== Skipping PIC loader tests (64-bit VM cannot mmap 32-bit shellcode) ==="

  test-freebsd-riscv64:
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: build-freebsd-riscv64, path: release/ }
      - uses: vmactions/freebsd-vm@v1
        with:
          arch: riscv64
          sync: scp
          usesh: true
          run: |
            for dir in release/*/; do
              opt=$(basename "$dir")
              for elf in "$dir"*.elf; do
                [ -f "$elf" ] || continue
                chmod +x "$elf"
                "$elf" || { echo "FAILED -${opt}"; exit 1; }
              done
            done
            echo "=== Skipping PIC loader tests (FreeBSD riscv64 has no package repository) ==="

  # ═════════════════════════════════════════════════════════════════════════
  # Test — vmactions Solaris
  # ═════════════════════════════════════════════════════════════════════════

  test-solaris-i386:
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: build-solaris-i386, path: release/ }
      - uses: vmactions/solaris-vm@v1
        with:
          sync: scp
          usesh: true
          run: |
            for dir in release/*/; do
              opt=$(basename "$dir")
              for elf in "$dir"*.elf; do
                [ -f "$elf" ] || continue
                chmod +x "$elf"
                "$elf" || { echo "FAILED -${opt}"; exit 1; }
              done
            done

  test-solaris-x86_64:
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: build-solaris-x86_64, path: release/ }
      - uses: vmactions/solaris-vm@v1
        with:
          sync: scp
          usesh: true
          run: |
            for dir in release/*/; do
              opt=$(basename "$dir")
              for bin in "$dir"*.bin; do
                [ -f "$bin" ] || continue
                echo "=== Testing PIC -${opt} ==="
                python3 scripts/loader.py --arch x86_64 "$bin" || { echo "FAILED"; exit 1; }
              done
            done

  # ═════════════════════════════════════════════════════════════════════════
  # Test — UEFI via QEMU
  # ═════════════════════════════════════════════════════════════════════════

  test-uefi-x86_64:
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: build-uefi-x86_64, path: release/ }
      - run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 ovmf libslirp0 qemu-system-common dosfstools mtools
      - run: |
          for dir in release/*/; do
            opt=$(basename "$dir")
            for efi in "$dir"*.efi; do
              [ -f "$efi" ] || continue
              echo "=== Testing UEFI -${opt} ==="
              DISK_IMG="uefi-disk.img"
              dd if=/dev/zero of="$DISK_IMG" bs=1M count=64 2>/dev/null
              mkfs.fat -F 32 -n UEFI "$DISK_IMG" >/dev/null
              mmd -i "$DISK_IMG" ::/EFI
              mmd -i "$DISK_IMG" ::/EFI/BOOT
              mcopy -i "$DISK_IMG" "$efi" "::EFI/BOOT/BOOTX64.EFI"
              set +e
              timeout 180s qemu-system-x86_64 \
                -bios /usr/share/ovmf/OVMF.fd \
                -drive file="$DISK_IMG",format=raw,if=ide,index=0 \
                -m 512 -nographic -serial mon:stdio \
                -nic user,model=e1000 \
                -no-reboot 2>&1 | sed -u 's/?\\[[0-9;]*m//g' | tee /tmp/qemu-output.log
              set -e
              rm -f "$DISK_IMG"
              grep -q "ALL TESTS PASSED" /tmp/qemu-output.log || { echo "UEFI FAILED -${opt}"; exit 1; }
            done
          done

  test-uefi-aarch64:
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: build-uefi-aarch64, path: release/ }
      - run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-arm qemu-efi-aarch64 libslirp0 qemu-system-common dosfstools mtools
      - run: |
          for dir in release/*/; do
            opt=$(basename "$dir")
            for efi in "$dir"*.efi; do
              [ -f "$efi" ] || continue
              echo "=== Testing UEFI -${opt} ==="
              DISK_IMG="uefi-disk.img"
              dd if=/dev/zero of="$DISK_IMG" bs=1M count=64 2>/dev/null
              mkfs.fat -F 32 -n UEFI "$DISK_IMG" >/dev/null
              mmd -i "$DISK_IMG" ::/EFI
              mmd -i "$DISK_IMG" ::/EFI/BOOT
              mcopy -i "$DISK_IMG" "$efi" "::EFI/BOOT/BOOTAA64.EFI"
              set +e
              timeout 180s qemu-system-aarch64 -M virt -cpu cortex-a72 \
                -bios /usr/share/qemu-efi-aarch64/QEMU_EFI.fd \
                -drive file="$DISK_IMG",format=raw,if=virtio \
                -m 512 -nographic -serial mon:stdio \
                -nic user,model=virtio \
                -no-reboot 2>&1 | sed -u 's/?\\[[0-9;]*m//g' | tee /tmp/qemu-output.log
              set -e
              rm -f "$DISK_IMG"
              grep -q "ALL TESTS PASSED" /tmp/qemu-output.log || { echo "UEFI FAILED -${opt}"; exit 1; }
            done
          done
