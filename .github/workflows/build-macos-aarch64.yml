name: macOS AArch64

on:
  pull_request:
    branches:
      - "**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LLVM and build tools
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
        run: |
          for i in 1 2 3; do
            brew install llvm ninja cmake && break
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "$(brew --prefix llvm)/bin" >> $GITHUB_PATH

      - name: Build all optimization levels
        run: |
          for opt in O0 O1 O2 O3 Os Oz Og; do
            echo "=== Building -${opt} ==="
            rm -rf build
            cmake --preset macos-aarch64-release -DOPTIMIZATION_LEVEL=${opt}
            cmake --build --preset macos-aarch64-release
            mkdir -p "release/${opt}"
            find build/release -type f -not -path "*/cmake/*" -exec cp {} "release/${opt}/" \;
          done

      - name: Upload all artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-macos-aarch64
          retention-days: 1
          path: release/

      - name: Test all optimization levels
        run: |
          for dir in release/*/; do
            opt=$(basename "$dir")
            echo "=== Testing -${opt} ==="
            for bin in "$dir"*.bin; do
              [ -f "$bin" ] || continue
              echo "=== Testing PIC -${opt} ==="
              if python3 scripts/loader.py --arch aarch64 "$bin"; then
                echo "=== PIC PASSED -${opt} ==="
              else
                echo "=== PIC FAILED -${opt} ==="
                exit 1
              fi
            done
          done
