name: Windows i386

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - "**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  LLVM_VERSION: "21.1.0"

jobs:
  build-and-test:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache LLVM
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: C:\Program Files\LLVM
          key: llvm-${{ env.LLVM_VERSION }}-windows-2022

      - name: Install Ninja
        shell: pwsh
        run: |
          choco install ninja -y
          ninja --version

      - name: Install LLVM
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $ver = "${{ env.LLVM_VERSION }}"
          $exe = "LLVM-$ver-win64.exe"
          $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-$ver/$exe"

          Write-Host "Downloading LLVM $ver..."
          Invoke-WebRequest -Uri $url -OutFile $exe
          Start-Process -FilePath ".\$exe" -ArgumentList "/S" -Wait

      - name: Add LLVM to PATH
        shell: pwsh
        run: |
          "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Build all optimization levels
        shell: pwsh
        run: |
          foreach ($opt in @("O0", "O1", "O2", "O3", "Os", "Oz", "Og")) {
            Write-Host "=== Building -$opt ==="
            Remove-Item -Recurse -Force build -ErrorAction SilentlyContinue
            cmake --preset windows-i386-release "-DOPTIMIZATION_LEVEL=$opt"
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            cmake --build --preset windows-i386-release
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            New-Item -ItemType Directory -Force -Path "release\$opt" | Out-Null
            Get-ChildItem -Path build\release -Recurse -File | Where-Object { $_.DirectoryName -notmatch '\\cmake\\' } | ForEach-Object { Copy-Item $_.FullName "release\$opt\" }
          }

      - name: Upload all artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-windows-i386
          retention-days: 1
          path: release/

      - name: Test all optimization levels
        if: always()
        shell: pwsh
        run: |
          foreach ($dir in Get-ChildItem -Path release -Directory) {
            $opt = $dir.Name
            Write-Host "=== Testing -$opt ==="
            foreach ($bin in Get-ChildItem -Path $dir.FullName -Filter "*.bin") {
              Write-Host "=== Testing PIC -$opt ==="
              python scripts/loader.py --arch i386 $bin.FullName
              if ($LASTEXITCODE -ne 0) {
                Write-Host "=== PIC FAILED -$opt ==="
                exit 1
              } else {
                Write-Host "=== PIC PASSED -$opt ==="
              }
            }
          }
