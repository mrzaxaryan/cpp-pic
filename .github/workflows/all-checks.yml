name: All Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

concurrency:
  group: all-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: All Checks
    runs-on: ubuntu-24.04
    steps:
      - name: Await all workflows
        uses: actions/github-script@v7
        env:
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            const sha = process.env.PR_HEAD_SHA || context.sha;
            const self = 'All Checks';
            const poll = 30_000;
            const timeout = 45 * 60_000;
            const start = Date.now();

            core.info(`SHA: ${sha.substring(0, 7)}`);
            core.info('Waiting 60s for workflows to start...');
            await new Promise(r => setTimeout(r, 60_000));

            while (Date.now() - start < timeout)
            {
              const { data: { workflow_runs: runs } } = await github.rest.actions.listWorkflowRunsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head_sha: sha,
                per_page: 100,
              });

              const others = runs.filter(r => r.name !== self);

              if (others.length === 0)
              {
                core.info('No workflows found yet, waiting...');
                await new Promise(r => setTimeout(r, poll));
                continue;
              }

              const pending = others.filter(r => r.status !== 'completed');

              if (pending.length > 0)
              {
                core.info(`Pending: ${pending.length}/${others.length} — ${pending.map(r => `${r.name} (${r.status})`).join(', ')}`);
                await new Promise(r => setTimeout(r, poll));
                continue;
              }

              const failed = others.filter(r => r.conclusion !== 'success' && r.conclusion !== 'skipped' && r.conclusion !== 'neutral');

              if (failed.length > 0)
              {
                core.setFailed(`${failed.length} workflow(s) failed:\n${failed.map(r => `  - ${r.name}: ${r.conclusion}`).join('\n')}`);
                return;
              }

              core.info(`All ${others.length} workflow(s) passed.`);
              return;
            }

            core.setFailed('Timed out waiting for workflows.');
